name: nix-checker
on:
  push:
permissions: {}

jobs:
  run-nix-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.PAT }}
      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run nix flake check
        run: nix flake check --all-systems
